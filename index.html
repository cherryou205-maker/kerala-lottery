const WA_NUMBER = '919360457290';
const TICKET_PRICE = 40;
let selected = new Set();

const grid = document.getElementById('ticketGrid');

function buildGrid() {
  grid.innerHTML = '';

  ALL_TICKETS.forEach(num => {
    const div = document.createElement('div');
    div.className = 'ticket';
    div.innerHTML = `🎟️ <br>${num}`;

    div.onclick = () => {
      if(selected.has(num)) {
        selected.delete(num);
        div.classList.remove('selected');
      } else {
        selected.add(num);
        div.classList.add('selected');
      }
    };

    grid.appendChild(div);
  });
}

function submitWhatsapp() {
  const number = document.getElementById('waNumber').value;

  if(selected.size < 3) {
    alert('Minimum 3 tickets select karo');
    return;
  }

  const ticketList = Array.from(selected).join('\n');
  const total = selected.size * TICKET_PRICE;

  const msg = encodeURIComponent(
    `KERALA LOTTERY BOOKING\n\nTickets:\n${ticketList}\n\nTotal: ₹${total}\nCustomer: ${number}`
  );

  window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`,'_blank');
}

buildGrid();
